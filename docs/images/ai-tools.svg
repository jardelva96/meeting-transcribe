<svg xmlns="http://www.w3.org/2000/svg" width="400" height="680" viewBox="0 0 400 680">
  <defs>
    <clipPath id="roundedAI">
      <rect width="400" height="680" rx="14"/>
    </clipPath>
  </defs>
  <g clip-path="url(#roundedAI)">
    <rect width="400" height="680" fill="#0c0c15"/>

    <!-- Topbar -->
    <rect x="0" y="0" width="400" height="44" fill="#111120"/>
    <line x1="0" y1="44" x2="400" y2="44" stroke="#1e1e35"/>
    <circle cx="24" cy="22" r="3.5" fill="#f59e0b"/>
    <text x="38" y="26" font-family="Inter, sans-serif" font-size="11.5" fill="#8888aa" font-weight="500">Sprint Planning · 14:32</text>

    <!-- Tabs -->
    <rect x="0" y="44" width="400" height="40" fill="#111120"/>
    <line x1="0" y1="84" x2="400" y2="84" stroke="#1e1e35"/>
    <text x="100" y="68" font-family="Inter, sans-serif" font-size="11.5" fill="#404060" font-weight="600" text-anchor="middle">Transcrição ao vivo</text>
    <g transform="translate(260, 62)">
      <rect x="-8" y="-10" width="14" height="10" rx="2" fill="none" stroke="#eeeef8" stroke-width="1.5"/>
      <circle cx="-4" cy="-6" r="0.8" fill="#eeeef8"/>
      <circle cx="2" cy="-6" r="0.8" fill="#eeeef8"/>
    </g>
    <text x="300" y="68" font-family="Inter, sans-serif" font-size="11.5" fill="#eeeef8" font-weight="600" text-anchor="middle">Ferramentas de IA</text>
    <line x1="230" y1="82" x2="370" y2="82" stroke="#6366f1" stroke-width="2"/>

    <!-- Section label -->
    <text x="16" y="112" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#404060" letter-spacing="0.7">ESTA REUNIÃO</text>

    <!-- Quick action cards -->
    <g font-family="Inter, sans-serif">
      <!-- card 1 -->
      <rect x="12" y="124" width="376" height="46" rx="10" fill="#191928" stroke="#1e1e35"/>
      <g transform="translate(24, 140)" stroke="#404060" fill="none" stroke-width="1.6" stroke-linecap="round">
        <line x1="0" y1="2" x2="15" y2="2"/>
        <line x1="0" y1="7" x2="15" y2="7"/>
        <line x1="0" y1="12" x2="10" y2="12"/>
      </g>
      <text x="52" y="152" font-size="12.5" fill="#8888aa">Quais são os pontos principais até agora?</text>

      <!-- card 2 -->
      <rect x="12" y="178" width="376" height="46" rx="10" fill="#191928" stroke="#1e1e35"/>
      <g transform="translate(24, 196)" stroke="#404060" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="0 4, 2 6, 5 2"/>
        <line x1="8" y1="4" x2="15" y2="4"/>
        <polyline points="0 11, 2 13, 5 9"/>
        <line x1="8" y1="11" x2="15" y2="11"/>
      </g>
      <text x="52" y="206" font-size="12.5" fill="#8888aa">Listar action items e próximos passos</text>

      <!-- card 3 -->
      <rect x="12" y="232" width="376" height="46" rx="10" fill="#191928" stroke="#1e1e35"/>
      <g transform="translate(24, 247)" stroke="#404060" fill="none" stroke-width="1.6" stroke-linecap="round">
        <circle cx="7" cy="7" r="6" fill="none"/>
        <path d="M5 5a2 2 0 0 1 4 0c0 1.3-2 1.3-2 3"/>
        <circle cx="7" cy="10.5" r="0.5" fill="#404060"/>
      </g>
      <text x="52" y="260" font-size="12.5" fill="#8888aa">Quais foram os principais debates?</text>

      <!-- card 4 -->
      <rect x="12" y="286" width="376" height="46" rx="10" fill="#191928" stroke="#1e1e35"/>
      <g transform="translate(24, 301)" stroke="#404060" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <rect x="0" y="2" width="16" height="11" rx="1"/>
        <polyline points="0 3, 8 9, 16 3"/>
      </g>
      <text x="52" y="314" font-size="12.5" fill="#8888aa">Criar email de follow-up</text>

      <!-- card 5 -->
      <rect x="12" y="340" width="376" height="46" rx="10" fill="#191928" stroke="#1e1e35"/>
      <g transform="translate(24, 355)" stroke="#404060" fill="none" stroke-width="1.6" stroke-linecap="round">
        <line x1="0" y1="14" x2="16" y2="14"/>
        <line x1="3" y1="14" x2="3" y2="9"/>
        <line x1="8" y1="14" x2="8" y2="4"/>
        <line x1="13" y1="14" x2="13" y2="7"/>
      </g>
      <text x="52" y="368" font-size="12.5" fill="#8888aa">Analisar insights e tom da reunião</text>
    </g>

    <!-- Input area -->
    <rect x="0" y="580" width="400" height="100" fill="#111120"/>
    <line x1="0" y1="580" x2="400" y2="580" stroke="#1e1e35"/>
    <rect x="12" y="596" width="376" height="44" rx="10" fill="#191928" stroke="#252540"/>
    <text x="24" y="620" font-family="Inter, sans-serif" font-size="12.5" fill="#404060">Pergunte-me qualquer coisa...</text>

    <!-- send button -->
    <rect x="353" y="609" width="26" height="26" rx="6" fill="#6366f1"/>
    <g transform="translate(361, 617)" stroke="#fff" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <line x1="5" y1="10" x2="5" y2="0"/>
      <polyline points="0 4, 5 0, 10 4"/>
    </g>

    <text x="16" y="660" font-family="Inter, sans-serif" font-size="10" fill="#404060">Todos os chats da IA são privados e visíveis somente para você.</text>
  </g>
</svg>
