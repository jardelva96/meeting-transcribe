<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <clipPath id="mgrClip"><rect width="1200" height="720" rx="14"/></clipPath>
  </defs>
  <g clip-path="url(#mgrClip)">
    <rect width="1200" height="720" fill="#0c0c15"/>

    <!-- Sidebar -->
    <rect x="0" y="0" width="320" height="720" fill="#111120"/>
    <line x1="320" y1="0" x2="320" y2="720" stroke="#1e1e35"/>

    <!-- brand -->
    <g transform="translate(24, 28)" stroke="#6366f1" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="0" y="0" width="8" height="14" rx="4" fill="#6366f1"/>
      <path d="M-4 7 a8 8 0 0 0 16 0"/>
      <line x1="4" y1="15" x2="4" y2="20"/>
      <line x1="0" y1="20" x2="8" y2="20"/>
    </g>
    <text x="54" y="42" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#eeeef8">Meeting Transcribe</text>
    <g transform="translate(280, 24)" stroke="#404060" fill="none" stroke-width="1.6" stroke-linecap="round">
      <circle cx="7" cy="7" r="2.5"/><path d="M13 7a6 6 0 0 1-1 3l1.5 1.5M1 7a6 6 0 0 0 1 3l-1.5 1.5"/>
    </g>

    <!-- search -->
    <rect x="20" y="70" width="280" height="34" rx="8" fill="#191928" stroke="#252540"/>
    <text x="34" y="91" font-family="Inter, sans-serif" font-size="12" fill="#404060">Buscar reuniões...</text>

    <!-- session items -->
    <g font-family="Inter, sans-serif">
      <!-- active -->
      <rect x="20" y="120" width="280" height="58" rx="8" fill="#1e1e30" stroke="#6366f1"/>
      <text x="32" y="142" font-size="12.5" font-weight="600" fill="#eeeef8">Sprint Planning</text>
      <text x="32" y="161" font-size="10.5" fill="#404060">19/04/2026 14:32 · 24 segmentos</text>

      <rect x="20" y="188" width="280" height="58" rx="8" fill="#191928" stroke="#1e1e35"/>
      <text x="32" y="210" font-size="12.5" font-weight="600" fill="#eeeef8">Reunião com Cliente X</text>
      <text x="32" y="229" font-size="10.5" fill="#404060">18/04/2026 10:00 · 47 segmentos</text>

      <rect x="20" y="256" width="280" height="58" rx="8" fill="#191928" stroke="#1e1e35"/>
      <text x="32" y="278" font-size="12.5" font-weight="600" fill="#eeeef8">1:1 Carlos</text>
      <text x="32" y="297" font-size="10.5" fill="#404060">17/04/2026 16:30 · 18 segmentos</text>

      <rect x="20" y="324" width="280" height="58" rx="8" fill="#191928" stroke="#1e1e35"/>
      <text x="32" y="346" font-size="12.5" font-weight="600" fill="#eeeef8">Demo Produto v2</text>
      <text x="32" y="365" font-size="10.5" fill="#404060">15/04/2026 11:00 · 63 segmentos</text>

      <rect x="20" y="392" width="280" height="58" rx="8" fill="#191928" stroke="#1e1e35"/>
      <text x="32" y="414" font-size="12.5" font-weight="600" fill="#eeeef8">Retro da sprint passada</text>
      <text x="32" y="433" font-size="10.5" fill="#404060">12/04/2026 16:00 · 38 segmentos</text>
    </g>

    <!-- footer -->
    <text x="20" y="680" font-family="Inter, sans-serif" font-size="11" fill="#404060">5 reuniões salvas</text>
    <text x="20" y="700" font-family="Inter, sans-serif" font-size="10" fill="#404060">Gravar: Ctrl+Shift+T · Painel: Ctrl+Shift+M</text>

    <!-- Main content -->
    <g transform="translate(340, 28)" font-family="Inter, sans-serif">
      <text x="0" y="24" font-size="22" font-weight="700" fill="#eeeef8">Sprint Planning</text>
      <text x="0" y="50" font-size="12" fill="#404060">19/04/2026 14:32 · Duração: 32:15 · 24 segmentos</text>

      <!-- action buttons -->
      <g transform="translate(0, 76)">
        <rect x="0" y="0" width="170" height="32" rx="7" fill="rgba(167,139,250,0.1)" stroke="#a78bfa"/>
        <text x="85" y="20" font-size="11.5" font-weight="600" fill="#a78bfa" text-anchor="middle">✦ Ferramentas de IA</text>

        <rect x="184" y="0" width="120" height="32" rx="7" fill="#191928" stroke="#252540"/>
        <text x="244" y="20" font-size="11.5" font-weight="600" fill="#8888aa" text-anchor="middle">Copiar tudo</text>

        <rect x="318" y="0" width="80" height="32" rx="7" fill="#191928" stroke="#252540"/>
        <text x="358" y="20" font-size="11.5" font-weight="600" fill="#8888aa" text-anchor="middle">TXT</text>

        <rect x="412" y="0" width="80" height="32" rx="7" fill="#191928" stroke="#252540"/>
        <text x="452" y="20" font-size="11.5" font-weight="600" fill="#8888aa" text-anchor="middle">JSON</text>
      </g>

      <!-- transcript entries -->
      <g transform="translate(0, 140)">
        <rect x="0" y="0" width="820" height="76" rx="10" fill="#191928" stroke="#1e1e35"/>
        <text x="16" y="24" font-size="10" font-weight="700" fill="#6366f1" font-family="JetBrains Mono, monospace">#1</text>
        <text x="780" y="24" font-size="10" fill="#404060" font-family="JetBrains Mono, monospace" text-anchor="end">14:33:02</text>
        <text x="16" y="48" font-size="13" fill="#eeeef8">Ana: Então o plano pra próxima sprint inclui a migração do auth e</text>
        <text x="16" y="67" font-size="13" fill="#eeeef8">dois bugs de alta prioridade que o suporte reportou.</text>

        <rect x="0" y="92" width="820" height="76" rx="10" fill="#191928" stroke="#1e1e35"/>
        <text x="16" y="116" font-size="10" font-weight="700" fill="#6366f1" font-family="JetBrains Mono, monospace">#2</text>
        <text x="780" y="116" font-size="10" fill="#404060" font-family="JetBrains Mono, monospace" text-anchor="end">14:33:18</text>
        <text x="16" y="140" font-size="13" fill="#eeeef8">Carlos: A migração eu posso assumir, mas preciso de um pair com alguém</text>
        <text x="16" y="159" font-size="13" fill="#eeeef8">que já mexeu no módulo de autenticação legada.</text>

        <rect x="0" y="184" width="820" height="76" rx="10" fill="#191928" stroke="#1e1e35"/>
        <text x="16" y="208" font-size="10" font-weight="700" fill="#6366f1" font-family="JetBrains Mono, monospace">#3</text>
        <text x="780" y="208" font-size="10" fill="#404060" font-family="JetBrains Mono, monospace" text-anchor="end">14:33:41</text>
        <text x="16" y="232" font-size="13" fill="#eeeef8">Ana: Perfeito. Vou marcar uma call com a Júlia pra vocês dois</text>
        <text x="16" y="251" font-size="13" fill="#eeeef8">sincronizarem ainda esta semana.</text>

        <rect x="0" y="276" width="820" height="76" rx="10" fill="#191928" stroke="#1e1e35"/>
        <text x="16" y="300" font-size="10" font-weight="700" fill="#6366f1" font-family="JetBrains Mono, monospace">#4</text>
        <text x="780" y="300" font-size="10" fill="#404060" font-family="JetBrains Mono, monospace" text-anchor="end">14:33:55</text>
        <text x="16" y="324" font-size="13" fill="#eeeef8">Júlia: Certo, estou disponível na quarta à tarde. Podemos fazer</text>
        <text x="16" y="343" font-size="13" fill="#eeeef8">30 min pra eu passar o contexto e deixar tudo documentado.</text>

        <rect x="0" y="368" width="820" height="76" rx="10" fill="#191928" stroke="#1e1e35"/>
        <text x="16" y="392" font-size="10" font-weight="700" fill="#6366f1" font-family="JetBrains Mono, monospace">#5</text>
        <text x="780" y="392" font-size="10" fill="#404060" font-family="JetBrains Mono, monospace" text-anchor="end">14:34:12</text>
        <text x="16" y="416" font-size="13" fill="#eeeef8">Carlos: Fechado. Sobre os bugs, o primeiro é de sessão expirando</text>
        <text x="16" y="435" font-size="13" fill="#eeeef8">antes da hora; já tenho uma hipótese do que pode ser.</text>
      </g>
    </g>
  </g>
</svg>
